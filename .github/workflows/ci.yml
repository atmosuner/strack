name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck API
        run: pnpm --filter api exec tsc --noEmit

      - name: Typecheck Web
        run: pnpm --filter web exec tsc -b

      - name: Typecheck Shared
        run: pnpm --filter @fpct/shared exec tsc --noEmit

      - name: Test Shared (recurrence)
        run: pnpm --filter @fpct/shared test
